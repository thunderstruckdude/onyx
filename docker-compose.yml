services:
  mongo:
    image: mongo:7
    container_name: auction-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" localhost:27017/test | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-rs-init:
    image: mongo:7
    container_name: auction-mongo-rs-init
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./docker/mongo/init-rs.sh:/init-rs.sh:ro
    entrypoint: ["/bin/bash", "/init-rs.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: auction-api
    depends_on:
      mongo:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/auction?replicaSet=rs0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-only-change-me}
      JWT_ACCESS_TTL: 15m
      JWT_ISSUER: secure-auction-backend
      CORS_ORIGIN: http://localhost:5173
      COOKIE_DOMAIN: ""
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    command: ["npm", "run", "dev:api"]

  web:
    build:
      context: ./client
      dockerfile: Dockerfile.web
    container_name: auction-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: http://api:4000
    volumes:
      - ./client:/app
      - web_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  mongo_data:
  api_node_modules:
  web_node_modules:
